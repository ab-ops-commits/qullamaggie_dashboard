name: Update Qullamaggie Dashboard

on:
  schedule:
    - cron: '30 12 * * *'  # 6:00 PM IST (12:30 PM UTC)
  workflow_dispatch:  # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run screening script
        run: |
          python scripts/update_data.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stocks.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stock data - $(date '+%Y-%m-%d %H:%M IST')"
          git push
