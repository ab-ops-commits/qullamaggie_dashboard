name: Update Qullamaggie Dashboard

on:
  schedule:
    - cron: '30 12 * * *'  # 6:00 PM IST (12:30 UTC) - Primary
    - cron: '0 13 * * *'   # 6:30 PM IST (13:00 UTC) - Backup 1
    - cron: '30 13 * * *'  # 7:00 PM IST (13:30 UTC) - Backup 2
  workflow_dispatch:  # Manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run screening script
        run: |
          python scripts/update_data.py
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stock data - $(date '+%Y-%m-%d %H:%M IST')"
          git pull --rebase
          git push
